<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>就活マイページ管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen">
  <div class="max-w-6xl mx-auto p-6 space-y-6">

    <div class="bg-white rounded-3xl shadow-lg p-6">
      <h1 class="text-3xl font-bold">就活マイページ管理</h1>
      <p class="text-gray-500 mt-2">
        Mac / iPhone / iPad対応のマイページランチャー
      </p>

      <div class="grid md:grid-cols-4 gap-4 mt-6">

        <input
          id="initialInput"
          type="text"
          placeholder="頭文字（A〜Z）"
          class="border border-gray-300 rounded-2xl p-3 outline-none focus:ring-2 focus:ring-black"
        />

        <input
          id="companyInput"
          type="text"
          placeholder="企業名"
          class="border border-gray-300 rounded-2xl p-3 outline-none focus:ring-2 focus:ring-black"
        />

        <input
          id="urlInput"
          type="url"
          placeholder="https://example.com"
          class="border border-gray-300 rounded-2xl p-3 outline-none focus:ring-2 focus:ring-black"
        />

        <input
          id="logoInput"
          type="url"
          placeholder="ロゴ画像URL（任意）"
          class="border border-gray-300 rounded-2xl p-3 outline-none focus:ring-2 focus:ring-black"
        />
      </div>

      <button
        onclick="addPortal()"
        class="mt-4 w-full bg-black text-white rounded-2xl p-3 font-semibold hover:opacity-80 transition"
      >
        追加
      </button>
    </div>

    <div class="bg-white rounded-3xl shadow-lg p-6">
      <div class="flex flex-col md:flex-row gap-4 md:items-center md:justify-between">

        <input
          id="jumpInput"
          type="text"
          maxlength="1"
          placeholder="A〜Zでジャンプ"
          class="border border-gray-300 rounded-2xl p-3 w-full md:max-w-xs outline-none focus:ring-2 focus:ring-black"
          oninput="jumpToGroup()"
        />

        <p class="text-sm text-gray-500">
          頭文字を入力するとその位置へ移動します。
        </p>
      </div>
    </div>

    <div class="flex justify-end">
      <button
        onclick="toggleDeleteMode()"
        class="bg-red-500 text-white px-4 py-2 rounded-2xl font-semibold hover:opacity-80 transition"
      >
        管理モード
      </button>
    </div>

    <div id="portalContainer" class="space-y-6"></div>
  </div>

  <script>
    const STORAGE_KEY = "job-portals";

    let portals = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    let deleteMode = false;

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(portals));
    }

    function toggleDeleteMode() {
      deleteMode = !deleteMode;
      render();
    }

    function addPortal() {
      const initial = document
        .getElementById("initialInput")
        .value
        .trim()
        .toUpperCase() || "その他";

      const company = document
        .getElementById("companyInput")
        .value
        .trim();

      const url = document
        .getElementById("urlInput")
        .value
        .trim();

      const logo = document
        .getElementById("logoInput")
        .value
        .trim();

      if (!company || !url) {
        alert("企業名とURLを入力してください。");
        return;
      }

      portals.push({
        id: crypto.randomUUID(),
        initial,
        company,
        url,
        logo,
      });

      save();
      render();

      document.getElementById("initialInput").value = "";
      document.getElementById("companyInput").value = "";
      document.getElementById("urlInput").value = "";
      document.getElementById("logoInput").value = "";
    }

    function deletePortal(id) {
      portals = portals.filter((p) => p.id !== id);
      save();
      render();
    }

    function jumpToGroup() {
      const value = document
        .getElementById("jumpInput")
        .value
        .toUpperCase();

      const target = document.getElementById(`group-${value}`);

      if (target) {
        target.scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      }
    }

    function render() {
      const container = document.getElementById("portalContainer");

      let filtered = [...portals];

      filtered.sort((a, b) => {
        return a.initial.localeCompare(b.initial);
      });

      const groups = {};

      filtered.forEach((p) => {
        const key = p.initial || "その他";

        if (!groups[key]) groups[key] = [];
        groups[key].push(p);
      });

      container.innerHTML = "";

      Object.keys(groups)
        .sort()
        .forEach((group) => {
          const section = document.createElement("div");
          section.id = `group-${group}`;
          section.className = "bg-white rounded-3xl shadow-lg p-6";

          section.innerHTML = `
            <h2 class="text-2xl font-bold mb-4">${group}</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 place-items-center">
              ${groups[group]
                .map(
                  (p) => `
                    <div class="border border-gray-200 rounded-2xl overflow-hidden hover:shadow-md transition bg-white w-full max-w-md">

                      <a
                        href="${p.url}"
                        target="_blank"
                        class="block p-4 hover:bg-gray-50 transition"
                      >

                        <div class="flex items-start justify-between gap-3">

                          <div class="flex items-center gap-3">

                            ${
                              p.logo
                                ? `<img src="${p.logo}" class="w-12 h-12 rounded-xl object-contain bg-white border" />`
                                : `<div class="w-12 h-12 rounded-xl bg-gray-200 flex items-center justify-center text-sm text-gray-500">Logo</div>`
                            }

                            <div>
                              <h3 class="font-semibold text-lg">${p.company}</h3>
                              <p class="text-xs text-gray-500 break-all">${p.url}</p>
                            </div>
                          </div>

                          ${deleteMode ? `
                            <button
                              onclick="event.preventDefault(); deletePortal('${p.id}')"
                              class="text-red-500 text-sm hover:underline shrink-0"
                            >
                              削除
                            </button>
                          ` : ``}
                        </div>
                      </a>
                    </div>
                  `
                )
                .join("")}
            </div>
          `;

          container.appendChild(section);
        });
    }

    render();
  </script>
</body>
</html>
