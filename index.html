<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>就活マイページ管理</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen text-gray-900">

<div class="max-w-6xl mx-auto p-6 space-y-6">

  <div class="bg-white rounded-3xl shadow-lg p-6">
    <h1 class="text-3xl font-bold">就活マイページ管理</h1>

    <div class="grid md:grid-cols-4 gap-4 mt-6">

      <input
        id="initialInput"
        type="text"
        placeholder="頭文字"
        class="border border-gray-300 rounded-2xl p-3"
      />

      <input
        id="companyInput"
        type="text"
        placeholder="企業名"
        class="border border-gray-300 rounded-2xl p-3"
      />

      <input
        id="urlInput"
        type="url"
        placeholder="URL"
        class="border border-gray-300 rounded-2xl p-3"
      />

      <input
        id="logoInput"
        type="url"
        placeholder="ロゴURL"
        class="border border-gray-300 rounded-2xl p-3"
      />
    </div>

    <button
      onclick="addPortal()"
      class="mt-4 w-full bg-black text-white rounded-2xl p-3 font-semibold"
    >
      追加
    </button>
  </div>

  <div class="bg-white rounded-3xl shadow-lg p-6">
    <input
      id="jumpInput"
      type="text"
      maxlength="1"
      placeholder="A〜Zでジャンプ"
      class="border border-gray-300 rounded-2xl p-3 w-full md:max-w-xs"
      oninput="jumpToGroup()"
    />
  </div>

  <div class="flex justify-end">
    <button
      onclick="toggleManageMode()"
      class="bg-red-500 text-white px-4 py-2 rounded-2xl"
    >
      管理モード
    </button>
  </div>

  <div id="portalContainer" class="space-y-6"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbycoI2qllZMWMj76aYv6pPErlttIO86TitHLvQwDCKexPSV4UaQpL0JKHRZ2SlpGq-dKg/exec";

let portals = [];
let manageMode = false;

async function loadData() {
  const res = await fetch(API_URL);
  portals = await res.json();
  render();
}

async function addPortal() {

  const item = {
    action: "add",
    id: crypto.randomUUID(),
    initial: document.getElementById("initialInput").value.trim().toUpperCase(),
    company: document.getElementById("companyInput").value.trim(),
    url: document.getElementById("urlInput").value.trim(),
    logo: document.getElementById("logoInput").value.trim()
  };

await fetch(API_URL, {
  method: "POST",
  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  },
  body: JSON.stringify(item)
});

  document.getElementById("initialInput").value = "";
  document.getElementById("companyInput").value = "";
  document.getElementById("urlInput").value = "";
  document.getElementById("logoInput").value = "";

  await loadData();
}

async function deletePortal(id) {

await fetch(API_URL, {
  method: "POST",
  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  },
  body: JSON.stringify({
    action: "delete",
    id
  })
});

  await loadData();
}

async function editPortal(portal) {

  const company = prompt("企業名", portal.company);
  if (company === null) return;

  const url = prompt("URL", portal.url);
  if (url === null) return;

  const initial = prompt("頭文字", portal.initial);
  if (initial === null) return;

  const logo = prompt("ロゴURL", portal.logo || "");

  await fetch(API_URL, {
    method: "POST",
    headers: {
  "Content-Type": "text/plain;charset=utf-8"
},
    body: JSON.stringify({
      action: "edit",
      id: portal.id,
      company,
      url,
      initial,
      logo
    })
  });

  await loadData();
}

function toggleManageMode() {
  manageMode = !manageMode;
  render();
}

function jumpToGroup() {

  const value = document
    .getElementById("jumpInput")
    .value
    .toUpperCase();

  const target = document.getElementById(`group-${value}`);

  if (target) {
    target.scrollIntoView({
      behavior: "smooth"
    });
  }
}

function render() {

  const container = document.getElementById("portalContainer");

  const sorted = [...portals].sort((a, b) =>
    a.initial.localeCompare(b.initial)
  );

  const groups = {};

  sorted.forEach(p => {

    const key = p.initial || "その他";

    if (!groups[key]) groups[key] = [];

    groups[key].push(p);
  });

  container.innerHTML = "";

  Object.keys(groups)
    .sort()
    .forEach(group => {

      const section = document.createElement("div");

      section.id = `group-${group}`;

      section.className =
        "bg-white rounded-3xl shadow-lg p-6";

      section.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">
          ${group}
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 place-items-center">

          ${groups[group].map(p => `

            <div class="border border-gray-200 rounded-2xl overflow-hidden bg-white hover:shadow-md transition w-full max-w-md">

              <a
                href="${p.url}"
                target="_blank"
                class="block p-4 hover:bg-gray-50 transition"
              >

                <div class="flex items-start justify-between gap-3">

                  <div class="flex items-center gap-3">

                    ${
                      p.logo
                      ? `<img src="${p.logo}" class="w-12 h-12 rounded-xl object-contain border bg-white">`
                      : `<div class="w-12 h-12 rounded-xl bg-gray-200 flex items-center justify-center text-xs text-gray-500">Logo</div>`
                    }

                    <div>
                      <h3 class="font-semibold text-lg">
                        ${p.company}
                      </h3>

                      <p class="text-xs text-gray-500 break-all">
                        ${p.url}
                      </p>
                    </div>
                  </div>

                  ${
                    manageMode
                    ? `
                      <div class="flex flex-col gap-2">

                        <button
                          onclick='event.preventDefault(); editPortal(${JSON.stringify(p)})'
                          class="text-blue-500 text-sm"
                        >
                          編集
                        </button>

                        <button
                          onclick='event.preventDefault(); deletePortal("${p.id}")'
                          class="text-red-500 text-sm"
                        >
                          削除
                        </button>

                      </div>
                    `
                    : ""
                  }

                </div>

              </a>

            </div>

          `).join("")}

        </div>
      `;

      container.appendChild(section);
    });
}

loadData();

</script>

</body>
</html>
